<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Katalog on-line</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #f8fafc;
      padding: 0;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }

    /* --- ХЕДЕР --- */
    .top-header {
      background: white;
      padding: 12px 20px;
      border-bottom: 1px solid #e9edf4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }
    .company-name {
      font-weight: 700;
      font-size: 1.15rem;
      color: #1e293b;
      letter-spacing: -0.3px;
    }
    .header-address {
      font-size: 0.85rem;
      color: #475569;
      text-align: right;
      line-height: 1.4;
    }
    .header-address strong {
      color: #0f172a;
    }

    /* --- ФІКСОВАНА ПАНЕЛЬ ФІЛЬТРІВ --- */
    .sticky-filter {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      padding: 12px 20px;
      border-bottom: 1px solid #e9edf4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s;
    }
    .sticky-filter.scrolled {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 12px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .filter-group {
      flex: 1 1 160px;
      min-width: 130px;
    }
    .filter-group label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #64748b;
      display: block;
      margin-bottom: 3px;
    }
    .filter-group .form-control,
    .filter-group .form-select {
      font-size: 0.85rem;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #fafcff;
      padding: 6px 12px;
    }
    .filter-group .form-control:focus,
    .filter-group .form-select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
    }
    .btn-group-price .btn {
      font-size: 0.7rem;
      padding: 5px 12px;
      font-weight: 600;
      border-color: #e2e8f0;
      background: white;
      color: #334155;
    }
    .btn-group-price .btn-check:checked + .btn {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }
    .btn-group-price .btn-check:not(:checked) + .btn:hover {
      background: #f1f5f9;
    }
    .category-dropdown-btn {
      font-size: 0.85rem;
      background: #fafcff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 12px;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #1e293b;
    }
    .category-dropdown-btn:hover {
      background: #f1f5f9;
    }
    .dropdown-menu-cat {
      max-height: 360px;
      overflow-y: auto;
      min-width: 260px;
      padding: 8px 4px;
      border-radius: 12px;
      border: 1px solid #e9edf4;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .cat-parent {
      font-weight: 600;
      font-size: 0.75rem;
      padding: 6px 12px 2px 12px;
      color: #0f172a;
      background: #f8fafc;
      border-radius: 6px;
      margin-top: 4px;
    }
    .cat-child {
      padding-left: 28px;
      font-size: 0.8rem;
    }
    .cat-child .form-check-input {
      margin-top: 0.2rem;
    }
    .cat-child .form-check-label {
      font-weight: 400;
      color: #334155;
    }

    /* --- КАРТКИ --- */
    .catalog-grid {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .product-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 0.25s ease, box-shadow 0.25s ease, z-index 0s;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: white;
      border: 1px solid #f1f4fa;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      border-color: #e2e8f0;
    }
    .product-img {
      height: 160px;
      object-fit: contain;
      padding: 12px;
      background: #fafcff;
      border-bottom: 1px solid #f1f4fa;
      border-radius: 14px 14px 0 0;
    }
    .product-cat {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      font-weight: 600;
    }
    
    /* ===== ВИПРАВЛЕННЯ ДЛЯ ДОВГИХ НАЗВ ===== */
    .product-title-wrapper {
      position: relative;
      margin-bottom: 6px;
    }
    .product-title {
      font-size: 0.85rem;
      line-height: 1.3;
      color: #0f172a;
      font-weight: 500;
      
      /* Обмеження висоти до 2 рядків */
      max-height: 2.6em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      
     
    }
    .product-title:hover {
      color: #4f46e5;
    }
    
    /* Стиль для повної назви при наведенні (якщо текст обрізаний) */
    .product-title[data-fulltext]::after {
      content: attr(data-fulltext);
      position: absolute;
      left: 0;
      top: 100%;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border: 1px solid #e9edf4;
      font-size: 0.85rem;
      font-weight: 400;
      color: #0f172a;
      white-space: normal;
      max-width: 300px;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .product-title[data-fulltext]:hover::after {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    
    /* Альтернативний варіант - якщо хочете завжди показувати повну назву */
    .product-title-expanded {
      font-size: 0.85rem;
      line-height: 1.3;
      margin-bottom: 6px;
      color: #0f172a;
      font-weight: 500;
      word-wrap: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
    }
    
    /* ===== КІНЕЦЬ ВИПРАВЛЕННЯ ===== */
    
    .product-code {
      color: #4f46e5;
      font-weight: 600;
      font-size: 0.75rem;
      margin-bottom: 6px;
    }
    .price-main {
      font-size: 1.2rem;
      color: #0d6efd;
      font-weight: 700;
      line-height: 1.1;
    }
    .price-vat {
      font-size: 0.7rem;
      color: #64748b;
    }
    .card-disabled {
      opacity: 0.55;
      filter: grayscale(0.4);
    }
    .no-drop-alert {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 0.7rem;
      padding: 4px 8px;
      text-align: center;
      font-weight: 700;
    }
    .btn-action {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
    }
    .btn-primary {
      background: #4f46e5;
      border-color: #4f46e5;
    }
    .btn-primary:hover {
      background: #4338ca;
      border-color: #4338ca;
    }
    .btn-outline-primary {
      color: #4f46e5;
      border-color: #4f46e5;
    }
    .btn-outline-primary:hover {
      background: #4f46e5;
      color: white;
    }
    
    /* Важливо: щоб випадаючі списки були ПОВЕРХ усіх карток */
    .product-card:has(.dropdown-menu.show) {
      z-index: 9999 !important;
    }
    .product-card .dropdown-menu {
      z-index: 10000 !important;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border: 1px solid #e9edf4;
      border-radius: 10px;
      padding: 6px 0;
    }
    .product-card .dropdown-item {
      font-size: 0.8rem;
      padding: 6px 16px;
      color: #1e293b;
    }
    .product-card .dropdown-item:hover {
      background: #f1f5f9;
      color: #0f172a;
    }

    /* --- УМОВИ --- */
    #conditions-box {
      background: white;
      padding: 20px 24px;
      border-radius: 14px;
      margin: 20px 20px 30px 20px;
      border: 1px solid #e9edf4;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    #conditions-box h4 {
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
    }
    #conditionsText {
      font-size: 0.9rem;
      color: #334155;
      line-height: 1.6;
    }

    /* --- ЛІЧИЛЬНИК ТОВАРІВ --- */
    .product-counter {
      font-size: 0.8rem;
      color: #64748b;
      padding: 8px 0 0 4px;
      font-weight: 500;
    }
    .product-counter span {
      color: #0f172a;
      font-weight: 700;
    }

    /* --- ЛОАДЕР --- */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
    }
    .walking-man {
      width: 60px;
      height: 60px;
      animation: walk 2.2s infinite ease-in-out;
    }
    @keyframes walk {
      0% { transform: translateX(-30px) scale(0.9); opacity: 0; }
      20% { opacity: 1; transform: translateX(-10px) scale(1); }
      80% { opacity: 1; transform: translateX(10px) scale(1); }
      100% { transform: translateX(30px) scale(0.9); opacity: 0; }
    }
    .loader-text {
      font-size: 0.85rem;
      font-weight: 600;
      color: #4f46e5;
      margin-top: 12px;
    }

    /* --- АДАПТИВ --- */
    @media (max-width: 576px) {
      .top-header { flex-direction: column; align-items: stretch; text-align: center; }
      .header-address { text-align: center; }
      .filter-section { flex-direction: column; align-items: stretch; }
      .filter-group { flex: 1 1 auto; }
      .sticky-filter { padding: 10px 12px; }
      .catalog-grid { padding: 12px; }
      .product-img { height: 130px; }
    }
  </style>
</head>
<body>

<div class="top-header">
  <div class="logo-area">
    <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
  </div>
  <div class="header-address">
    <strong>Adres:</strong> ul. Armii Krajowej 74, 58-130 Żarów<br>
    <span style="font-size:0.75rem; color:#94a3b8;">📞 74 857 03 39 | ✉ sklep@drabiny.info</span>
  </div>
</div>

<div class="sticky-filter" id="stickyFilter">
  <div class="filter-section">
    <div class="filter-group">
      <label>Kategorie</label>
      <div class="dropdown">
        <button class="category-dropdown-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <span id="selectedCatsLabel">Wybór kategorii</span>
          <span class="badge bg-primary rounded-pill" id="catCount" style="font-size:0.6rem; background:#4f46e5;">0</span>
        </button>
        <div class="dropdown-menu dropdown-menu-cat" id="categoryContainer"></div>
      </div>
    </div>

    <div class="filter-group">
      <label>Rodzaj ceny</label>
      <div class="btn-group btn-group-price w-100" role="group">
        <input type="radio" class="btn-check" name="priceType" id="p_local" value="local" checked onchange="applyFilters()">
        <label class="btn" for="p_local">Żarów</label>
        <input type="radio" class="btn-check" name="priceType" id="p_drop" value="drop" onchange="applyFilters()">
        <label class="btn" for="p_drop">Dostawa</label>
        <input type="radio" class="btn-check" name="priceType" id="p_dropshipping" value="dropshipping" onchange="applyFilters()">
        <label class="btn" for="p_dropshipping">Dropship</label>
      </div>
    </div>

    <div class="filter-group" style="flex: 2 1 200px;">
      <label>Szukaj</label>
      <input type="text" id="searchInput" class="form-control" placeholder="Nazwa lub SKU..." onkeyup="applyFilters()">
    </div>
  </div>
</div>

<div class="catalog-grid">
  <!-- Лічильник товарів -->
  <div class="product-counter" id="productCounter">
    Znaleziono: <span id="productCount">0</span> produktów
  </div>
  
  <div id="catalogContainer" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 row-cols-xl-6 g-3">
    <div class="text-center w-100 mt-5" id="loader">
      <div class="loader-container">
        <svg class="walking-man" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="15" r="5" fill="#333"/>
          <path d="M32 20V40M32 25L22 35M32 25L42 35M32 40L25 55M32 40L39 55" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          <g transform="rotate(-20 32 25)">
            <path d="M10 20H54M10 30H54M15 18V32M25 18V32M35 18V32M45 18V32M55 18V32" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
          </g>
        </svg>
        <p class="loader-text">Dostarczamy produkty...</p>
      </div>
    </div>
  </div>
</div>

<div id="conditions-box" style="display:none;">
  <h4 class="fw-bold mb-3">📋 Warunki handlowe</h4>
  <div id="conditionsText"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allProducts = [];

  window.onload = () => {
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyUeaVAhZaS5cCbtrgDCrpKvWH-ubcaaENNILoJzSBAZwDKX7RVBxDQscayVInbufsw/exec?get=data";

    fetch(webAppUrl)
      .then(response => {
        if (!response.ok) throw new Error("Помилка мережі");
        return response.json();
      })
      .then(data => {
        if (data.error) throw new Error(data.error);
        allProducts = data.items;
        if (data.conditions) {
          document.getElementById('conditionsText').innerHTML = data.conditions.replace(/\n/g, '<br>');
          document.getElementById('conditions-box').style.display = 'block';
        }
        renderCategoryTree(allProducts);
        renderCards(allProducts);
        document.getElementById('loader')?.remove();
        updateCategoryCount();
        updateProductCounter(allProducts.length);
        window.addEventListener('scroll', handleScrollShadow);
      })
      .catch(error => {
        console.error("Помилка завантаження даних:", error);
        const loader = document.getElementById('loader');
        if (loader) {
          loader.innerHTML = `<p class="text-danger text-center">⚠️ Błąd podczas wczytywania katalogu. Spróbuj odświeżyć stronę.</p>`;
        }
      });
  };

  function handleScrollShadow() {
    const el = document.getElementById('stickyFilter');
    if (window.scrollY > 10) {
      el.classList.add('scrolled');
    } else {
      el.classList.remove('scrolled');
    }
  }

  function renderCategoryTree(data) {
    const container = document.getElementById('categoryContainer');
    const tree = {};
    data.forEach(item => {
      const parts = String(item.category).split(',').map(s => s.trim());
      const parent = parts[0] || "Inne";
      if (!tree[parent]) tree[parent] = new Set();
      if (parts[1]) tree[parent].add(parts[1]);
    });
    let html = '';
    Object.keys(tree).sort().forEach(p => {
      html += `<div class="cat-parent small">${p}</div>`;
      html += `<div class="form-check cat-child"><input class="form-check-input cat-check" type="checkbox" value="${p}" data-mode="parent" onchange="applyFilters()"><label class="form-check-label w-100">Wszystkie</label></div>`;
      Array.from(tree[p]).sort().forEach(c => {
        html += `<div class="form-check cat-child"><input class="form-check-input cat-check" type="checkbox" value="${c}" data-mode="child" onchange="applyFilters()"><label class="form-check-label w-100">${c}</label></div>`;
      });
    });
    container.innerHTML = html;
    document.querySelectorAll('.cat-check').forEach(cb => {
      cb.addEventListener('change', () => {
        updateCategoryCount();
        applyFilters();
      });
    });
  }

  function updateCategoryCount() {
    const checked = document.querySelectorAll('.cat-check:checked').length;
    document.getElementById('catCount').textContent = checked;
    const label = document.getElementById('selectedCatsLabel');
    if (checked === 0) {
      label.textContent = 'Wybór kategorii';
    } else {
      label.textContent = `Wybrano ${checked} kategorii`;
    }
  }

  function updateProductCounter(count) {
    document.getElementById('productCount').textContent = count;
  }

  function renderCards(items) {
    const container = document.getElementById('catalogContainer');
    const isDropMode = document.getElementById('p_drop').checked;
    const isDropshippingMode = document.getElementById('p_dropshipping').checked;

    // Оновлюємо лічильник
    updateProductCounter(items.length);

    container.innerHTML = items.map(item => {
      let pRaw, vRaw;
      if (isDropMode) {
        pRaw = item.priceDrop;
        vRaw = item.vatDrop;
      } else if (isDropshippingMode) {
        pRaw = item.priceDropshipping;
        vRaw = item.vatDropshipping;
      } else {
        pRaw = item.price;
        vRaw = item.vat;
      }

      const isUnavailable = (isDropMode || isDropshippingMode) && (!pRaw || parseFloat(String(pRaw).replace(',','.')) === 0);

      const parsePrice = (val) => {
        if (!val) return 0;
        let s = String(val).replace(/\s/g, '').replace(',', '.');
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      };

      let p = parsePrice(pRaw);
      let v = parsePrice(vRaw);

      const priceFormatted = p.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const vatFormatted = v.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      const links = item.productUrls || [];
      let actionHtml = '';

      if (isUnavailable) {
        actionHtml = `<div class="no-drop-alert mt-2">BRAK</div>`;
      } else if (links.length === 0) {
        actionHtml = `<button class="btn btn-action btn-light w-100 mt-2 text-muted border" disabled style="cursor: not-allowed;">Brak danych</button>`;
      } else if (links.length === 1) {
        actionHtml = `<a href="${links[0].url}" target="_blank" class="btn btn-action btn-primary w-100 mt-2">${links[0].label}</a>`;
      } else if (links.length > 1) {
        actionHtml = `
          <div class="dropdown mt-2">
            <button class="btn btn-action btn-primary dropdown-toggle w-100" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              Materiały
            </button>
            <ul class="dropdown-menu">
              ${links.map(l => `<li><a class="dropdown-item" href="${l.url}" target="_blank">${l.label}</a></li>`).join('')}
            </ul>
          </div>`;
      }

      // Екрануємо назву для data-атрибута
      const escapedTitle = item.title.replace(/"/g, '&quot;');

      return `<div class="col">
        <div class="card product-card ${isUnavailable ? 'card-disabled' : ''}">
          <img src="${item.photo}" class="product-img" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f1f4fa%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2394a3b8%22 font-size=%2214%22 font-family=%22Inter%22%3EBrak zdj%3C/text%3E%3C/svg%3E'">
          <div class="card-body d-flex flex-column">
            <div class="product-cat">${item.category}</div>
            <div class="product-title-wrapper">
              <div class="product-title" data-fulltext="${escapedTitle}">
                ${item.title}
              </div>
            </div>
            <div class="product-code">SKU: ${item.code}</div>
            <div class="mt-auto pt-2 border-top">
              ${isUnavailable ? '<div class="text-center py-2">—</div>' : `
                <div class="price-main">${priceFormatted} <small style="font-size:0.65rem; font-weight:400;">zł</small></div>
                <div class="price-vat mb-1">z VAT: ${vatFormatted}</div>
              `}
              ${actionHtml}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
    
    // Ініціалізуємо всі dropdowns для нових карток
    document.querySelectorAll('.dropdown-toggle').forEach(el => {
      new bootstrap.Dropdown(el);
    });
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const activeChecks = Array.from(document.querySelectorAll('.cat-check:checked'));
    const filtered = allProducts.filter(p => {
      const matchSearch = p.title.toLowerCase().includes(search) || p.code.toLowerCase().includes(search);
      if (activeChecks.length === 0) return matchSearch;
      const itemCats = p.category.split(',').map(s => s.trim());
      const matchCat = activeChecks.some(check => {
        if (check.dataset.mode === 'parent') return itemCats[0] === check.value;
        return itemCats.includes(check.value);
      });
      return matchSearch && matchCat;
    });
    renderCards(filtered);
    updateCategoryCount();
  }
</script>
